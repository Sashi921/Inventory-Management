{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Add Supplier</h2>

<div class="card shadow p-4">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Save Supplier</button>
        <a href="/add/" class="btn btn-secondary">Back</a>
    </form>
</div>

{% endblock %}
